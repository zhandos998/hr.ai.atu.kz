x-app-env: &app-env
  APP_NAME: ${APP_NAME:-VACANCY.ATU.KZ}
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_KEY: ${APP_KEY:?APP_KEY is required}
  APP_URL: ${APP_URL:-http://localhost:8000}
  APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Almaty}
  APP_LOCALE: ${APP_LOCALE:-ru}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-ru}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_LEVEL: ${LOG_LEVEL:-warning}
  DB_CONNECTION: mysql
  DB_HOST: db
  DB_PORT: 3306
  DB_DATABASE: ${DOCKER_DB_DATABASE:-vacancy}
  DB_USERNAME: ${DOCKER_DB_USERNAME:-vacancy}
  DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
  CACHE_STORE: ${CACHE_STORE:-database}
  SESSION_DRIVER: ${SESSION_DRIVER:-database}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-mailpit}
  MAIL_PORT: ${MAIL_PORT:-1025}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@example.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-VACANCY.ATU.KZ}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  TEACHER_AUDIT_URL: ${TEACHER_AUDIT_URL:-https://kmk.atu.kz/api/external/teacher-audit}
  TEACHER_AUDIT_API_KEY: ${TEACHER_AUDIT_API_KEY:-}
  TEACHER_AUDIT_VERIFY_SSL: ${TEACHER_AUDIT_VERIFY_SSL:-false}
  TELESCOPE_ENABLED: ${TELESCOPE_ENABLED:-false}

services:
  app:
    build:
      context: .
      target: app
    image: vacancy-atu-app:latest
    restart: unless-stopped
    environment:
      <<: *app-env
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy

  queue:
    image: vacancy-atu-app:latest
    build:
      context: .
      target: app
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=120"]
    environment:
      <<: *app-env
      RUN_OPTIMIZE: "false"
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started

  nginx:
    build:
      context: .
      target: nginx
    image: vacancy-atu-nginx:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - storage_data:/var/www/html/storage:ro
    depends_on:
      app:
        condition: service_started

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DOCKER_DB_DATABASE:-vacancy}
      MYSQL_USER: ${DOCKER_DB_USERNAME:-vacancy}
      MYSQL_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  storage_data:
